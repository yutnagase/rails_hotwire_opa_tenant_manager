<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 500" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b85450"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="500" fill="#fff"/>

  <!-- Title -->
  <text x="410" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Dual-Layer Tenant Isolation</text>

  <!-- Query flow from app -->
  <rect x="60" y="70" width="200" height="60" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="160" y="96" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Rails Application</text>
  <text x="160" y="114" text-anchor="middle" font-size="11" fill="#555">ActiveRecord Query</text>

  <line x1="160" y1="130" x2="160" y2="160" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 1 -->
  <rect x="30" y="162" width="700" height="120" rx="10" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="380" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Layer 1: Application Layer — acts_as_tenant</text>

  <text x="60" y="212" font-size="12" fill="#555">• Automatically appends WHERE tenant_id = ? to all ActiveRecord queries</text>
  <text x="60" y="232" font-size="12" fill="#555">• Prevents most cross-tenant data access in normal application code</text>
  <text x="60" y="256" font-size="12" fill="#b85450" font-weight="bold">⚠ Cannot protect against: raw SQL, query builder bugs, direct DB access</text>

  <line x1="160" y1="282" x2="160" y2="310" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layer 2 -->
  <rect x="30" y="312" width="700" height="130" rx="10" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="380" y="337" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Layer 2: Database Layer — PostgreSQL RLS</text>

  <text x="60" y="362" font-size="12" fill="#555">• Database engine enforces row filtering regardless of how the query was built</text>
  <text x="60" y="382" font-size="12" fill="#555">• Policy: tenant_id = current_setting('app.current_tenant_id')::bigint</text>
  <text x="60" y="402" font-size="12" fill="#555">• Active only when connected as rails_user (NOBYPASSRLS)</text>
  <text x="60" y="426" font-size="12" fill="#82b366" font-weight="bold">✓ Catches everything Layer 1 misses — last line of defense</text>

  <!-- Shield icon area -->
  <rect x="750" y="162" width="50" height="280" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="775" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#333" transform="rotate(-90,775,260)">DEFENSE IN DEPTH</text>

  <!-- Result -->
  <line x1="160" y1="442" x2="160" y2="470" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="60" y="472" width="200" height="20" rx="4" fill="none" stroke="none"/>
  <text x="160" y="486" text-anchor="middle" font-size="12" font-weight="bold" fill="#82b366">✓ Only tenant's own rows returned</text>
</svg>
