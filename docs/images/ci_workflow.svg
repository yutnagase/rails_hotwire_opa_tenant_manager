<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 310" font-family="Helvetica, Arial, sans-serif">
  <!-- Background -->
  <rect width="740" height="310" fill="#fff"/>

  <!-- Outer frame: GitHub Actions CI -->
  <rect x="20" y="20" width="700" height="270" rx="10" fill="#f5f5f5" stroke="#666" stroke-width="2"/>
  <text x="370" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">GitHub Actions CI</text>
  <text x="370" y="68" text-anchor="middle" font-size="11" fill="#888">Triggered on push to main / Pull Request (all jobs run in parallel)</text>

  <!-- Security: scan_ruby -->
  <rect x="50" y="90" width="190" height="80" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="145" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">scan_ruby</text>
  <text x="145" y="135" text-anchor="middle" font-size="11" fill="#555">Brakeman</text>
  <text x="145" y="152" text-anchor="middle" font-size="10" fill="#888">Security static analysis</text>

  <!-- Security: scan_js -->
  <rect x="270" y="90" width="190" height="80" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="365" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">scan_js</text>
  <text x="365" y="135" text-anchor="middle" font-size="11" fill="#555">importmap audit</text>
  <text x="365" y="152" text-anchor="middle" font-size="10" fill="#888">JS dependency vulnerability scan</text>

  <!-- Code quality: lint -->
  <rect x="490" y="90" width="190" height="80" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="585" y="115" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">lint</text>
  <text x="585" y="135" text-anchor="middle" font-size="11" fill="#555">RuboCop</text>
  <text x="585" y="152" text-anchor="middle" font-size="10" fill="#888">Code style check</text>

  <!-- Testing: test -->
  <rect x="50" y="190" width="190" height="80" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="145" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">test</text>
  <text x="145" y="235" text-anchor="middle" font-size="11" fill="#555">RSpec + PostgreSQL</text>
  <text x="145" y="252" text-anchor="middle" font-size="10" fill="#888">Application tests</text>

  <!-- Testing: test_opa -->
  <rect x="270" y="190" width="190" height="80" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="365" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">test_opa</text>
  <text x="365" y="235" text-anchor="middle" font-size="11" fill="#555">opa test</text>
  <text x="365" y="252" text-anchor="middle" font-size="10" fill="#888">OPA policy tests</text>

  <!-- Legend -->
  <rect x="510" y="200" width="170" height="60" rx="6" fill="#fff" stroke="#999" stroke-width="1"/>
  <rect x="520" y="212" width="12" height="12" rx="2" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="538" y="223" font-size="10" fill="#555">Security</text>
  <rect x="610" y="212" width="12" height="12" rx="2" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="628" y="223" font-size="10" fill="#555">Code quality</text>
  <rect x="520" y="236" width="12" height="12" rx="2" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="538" y="247" font-size="10" fill="#555">Testing</text>
</svg>
