<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="620" fill="#fff"/>

  <!-- ブラウザ -->
  <rect x="40" y="200" width="180" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="130" y="233" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">ブラウザ</text>
  <text x="130" y="255" text-anchor="middle" font-size="12" fill="#555">(Hotwire / Turbo)</text>

  <!-- Rails アプリコンテナ -->
  <rect x="320" y="80" width="340" height="380" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="490" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Rails アプリケーション (Puma)</text>

  <!-- Devise + Auth0 -->
  <rect x="340" y="130" width="145" height="50" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="412" y="151" text-anchor="middle" font-size="12" fill="#333">Devise + Auth0</text>
  <text x="412" y="168" text-anchor="middle" font-size="11" fill="#666">(認証)</text>

  <!-- acts_as_tenant -->
  <rect x="500" y="130" width="145" height="50" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="572" y="151" text-anchor="middle" font-size="12" fill="#333">acts_as_tenant</text>
  <text x="572" y="168" text-anchor="middle" font-size="11" fill="#666">(アプリ層テナント分離)</text>

  <!-- ApplicationController -->
  <rect x="355" y="210" width="275" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="492" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">ApplicationController</text>
  <text x="492" y="250" text-anchor="middle" font-size="11" fill="#555">scope_to_tenant / authorize_with_opa</text>

  <!-- OpaClient -->
  <rect x="355" y="300" width="125" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="417" y="321" text-anchor="middle" font-size="12" fill="#333">OpaClient</text>
  <text x="417" y="338" text-anchor="middle" font-size="11" fill="#555">(HTTP)</text>

  <!-- SET ROLE -->
  <rect x="505" y="300" width="125" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="567" y="321" text-anchor="middle" font-size="12" fill="#333">SET ROLE</text>
  <text x="567" y="338" text-anchor="middle" font-size="11" fill="#555">rails_user</text>

  <!-- OPA -->
  <rect x="310" y="480" width="190" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="405" y="510" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">OPA</text>
  <text x="405" y="530" text-anchor="middle" font-size="12" fill="#555">(ポリシーエンジン)</text>
  <text x="405" y="548" text-anchor="middle" font-size="11" fill="#888">:8181</text>

  <!-- authz.rego -->
  <path d="M540,490 L660,490 L660,555 L540,555 L540,505 L555,490 Z" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="600" y="520" text-anchor="middle" font-size="11" fill="#333">authz.rego</text>
  <text x="600" y="537" text-anchor="middle" font-size="11" fill="#555">(Rego ポリシー)</text>

  <!-- PostgreSQL コンテナ -->
  <rect x="760" y="130" width="260" height="300" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="890" y="158" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">PostgreSQL 17</text>

  <!-- テーブル -->
  <rect x="785" y="180" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="830" y="207" text-anchor="middle" font-size="12" fill="#333">tenants</text>

  <rect x="900" y="180" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="945" y="207" text-anchor="middle" font-size="12" fill="#333">users</text>

  <rect x="785" y="245" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="830" y="272" text-anchor="middle" font-size="12" fill="#333">projects</text>

  <rect x="900" y="245" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="945" y="272" text-anchor="middle" font-size="12" fill="#333">tasks</text>

  <!-- RLS ラベル -->
  <rect x="785" y="310" width="205" height="40" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="887" y="327" text-anchor="middle" font-size="11" font-style="italic" fill="#333">RLS 有効</text>
  <text x="887" y="343" text-anchor="middle" font-size="11" font-style="italic" fill="#555">(tenant_id による行フィルタリング)</text>

  <!-- セキュリティレイヤー -->
  <rect x="40" y="380" width="260" height="110" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="50" y="400" font-size="11" fill="#333">レイヤー1: サブドメイン → テナント識別</text>
  <text x="50" y="418" font-size="11" fill="#333">レイヤー2: Devise + Auth0 認証</text>
  <text x="50" y="436" font-size="11" fill="#333">レイヤー3: acts_as_tenant (アプリ層分離)</text>
  <text x="50" y="454" font-size="11" fill="#333">レイヤー4: OPA ロールベース認可</text>
  <text x="50" y="472" font-size="11" fill="#333">レイヤー5: PostgreSQL RLS (DB層分離)</text>

  <!-- 矢印 -->
  <!-- ブラウザ → Rails -->
  <line x1="220" y1="240" x2="318" y2="240" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="269" y="232" text-anchor="middle" font-size="10" fill="#555">HTTP</text>
  <text x="269" y="245" text-anchor="middle" font-size="10" fill="#555">(Turbo Drive)</text>

  <!-- SET ROLE → PostgreSQL -->
  <line x1="630" y1="325" x2="758" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="290" text-anchor="middle" font-size="10" fill="#555">SQL</text>
  <text x="700" y="303" text-anchor="middle" font-size="10" fill="#555">(SET ROLE)</text>

  <!-- OpaClient → OPA -->
  <line x1="417" y1="350" x2="405" y2="478" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="420" text-anchor="middle" font-size="10" fill="#555">HTTP POST</text>
  <text x="430" y="433" text-anchor="middle" font-size="10" fill="#555">(JSON)</text>

  <!-- OPA → authz.rego -->
  <line x1="500" y1="520" x2="538" y2="520" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>
</svg>
