<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620" font-family="Helvetica, Arial, sans-serif">
  <!-- 背景 -->
  <rect width="920" height="620" fill="#fff"/>

  <!-- タイトル -->
  <text x="460" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">ER図</text>

  <!-- ===== tenants テーブル ===== -->
  <rect x="40" y="70" width="240" height="175" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <rect x="40" y="70" width="240" height="32" rx="8" fill="#d6b656"/>
  <rect x="40" y="94" width="240" height="8" fill="#d6b656"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">tenants</text>
  <text x="55" y="122" font-size="11" fill="#333">🔑 id : bigint (PK)</text>
  <text x="55" y="142" font-size="11" fill="#333">name : string (NOT NULL)</text>
  <text x="55" y="162" font-size="11" fill="#333">subdomain : string (NOT NULL, UQ)</text>
  <text x="55" y="182" font-size="11" fill="#888">created_at : datetime</text>
  <text x="55" y="202" font-size="11" fill="#888">updated_at : datetime</text>

  <!-- ===== users テーブル ===== -->
  <rect x="40" y="320" width="280" height="255" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <rect x="40" y="320" width="280" height="32" rx="8" fill="#6c8ebf"/>
  <rect x="40" y="344" width="280" height="8" fill="#6c8ebf"/>
  <text x="180" y="342" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">users</text>
  <text x="55" y="372" font-size="11" fill="#333">🔑 id : bigint (PK)</text>
  <text x="55" y="392" font-size="11" fill="#333">🔗 tenant_id : bigint (FK, NOT NULL)</text>
  <text x="55" y="412" font-size="11" fill="#333">auth0_uid : string (NOT NULL)</text>
  <text x="55" y="432" font-size="11" fill="#333">name : string (NOT NULL)</text>
  <text x="55" y="452" font-size="11" fill="#333">email : string (NOT NULL)</text>
  <text x="55" y="472" font-size="11" fill="#333">role : string (NOT NULL, DEFAULT 'member')</text>
  <text x="55" y="492" font-size="11" fill="#333">seed_admin : boolean (DEFAULT false)</text>
  <text x="55" y="512" font-size="11" fill="#888">created_at : datetime</text>
  <text x="55" y="532" font-size="11" fill="#888">updated_at : datetime</text>
  <text x="55" y="558" font-size="10" fill="#666">UQ: (auth0_uid, tenant_id)</text>

  <!-- ===== projects テーブル ===== -->
  <rect x="400" y="70" width="260" height="175" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <rect x="400" y="70" width="260" height="32" rx="8" fill="#82b366"/>
  <rect x="400" y="94" width="260" height="8" fill="#82b366"/>
  <text x="530" y="92" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">projects</text>
  <text x="415" y="122" font-size="11" fill="#333">🔑 id : bigint (PK)</text>
  <text x="415" y="142" font-size="11" fill="#333">🔗 tenant_id : bigint (FK, NOT NULL)</text>
  <text x="415" y="162" font-size="11" fill="#333">name : string (NOT NULL)</text>
  <text x="415" y="182" font-size="11" fill="#888">created_at : datetime</text>
  <text x="415" y="202" font-size="11" fill="#888">updated_at : datetime</text>

  <!-- ===== tasks テーブル ===== -->
  <rect x="580" y="320" width="300" height="235" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <rect x="580" y="320" width="300" height="32" rx="8" fill="#b85450"/>
  <rect x="580" y="344" width="300" height="8" fill="#b85450"/>
  <text x="730" y="342" text-anchor="middle" font-size="14" font-weight="bold" fill="#fff">tasks</text>
  <text x="595" y="372" font-size="11" fill="#333">🔑 id : bigint (PK)</text>
  <text x="595" y="392" font-size="11" fill="#333">🔗 tenant_id : bigint (FK, NOT NULL)</text>
  <text x="595" y="412" font-size="11" fill="#333">🔗 project_id : bigint (FK, NOT NULL)</text>
  <text x="595" y="432" font-size="11" fill="#333">🔗 user_id : bigint (FK, nullable)</text>
  <text x="595" y="452" font-size="11" fill="#333">name : string (NOT NULL)</text>
  <text x="595" y="472" font-size="11" fill="#333">status : string (NOT NULL, DEFAULT 'todo')</text>
  <text x="595" y="492" font-size="11" fill="#888">created_at : datetime</text>
  <text x="595" y="512" font-size="11" fill="#888">updated_at : datetime</text>
  <text x="595" y="538" font-size="10" fill="#666">status: todo / doing / done</text>

  <!-- ========================================== -->
  <!-- リレーション線 (クロウフットをインライン描画) -->
  <!-- ========================================== -->

  <!-- tenants 1──* users (垂直: x=160, y=245→320) -->
  <line x1="160" y1="245" x2="160" y2="320" stroke="#333" stroke-width="1.5"/>
  <!-- 1側 (tenants) -->
  <line x1="153" y1="250" x2="167" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="172" y="254" font-size="10" fill="#555">1</text>
  <!-- *側 (users): クロウフット -->
  <line x1="150" y1="308" x2="160" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="170" y1="308" x2="160" y2="320" stroke="#333" stroke-width="1.5"/>
  <text x="172" y="314" font-size="10" fill="#555">*</text>

  <!-- tenants 1──* projects (水平: y=157, x=280→400) -->
  <line x1="280" y1="157" x2="400" y2="157" stroke="#333" stroke-width="1.5"/>
  <!-- 1側 (tenants) -->
  <line x1="285" y1="150" x2="285" y2="164" stroke="#333" stroke-width="1.5"/>
  <text x="289" y="148" font-size="10" fill="#555">1</text>
  <!-- *側 (projects): クロウフット -->
  <line x1="388" y1="147" x2="400" y2="157" stroke="#333" stroke-width="1.5"/>
  <line x1="388" y1="167" x2="400" y2="157" stroke="#333" stroke-width="1.5"/>
  <text x="391" y="145" font-size="10" fill="#555">*</text>

  <!-- tenants 1──* tasks (L字: tenants右下 → tasks上) -->
  <path d="M 270 245 L 270 285 L 650 285 L 650 320" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- 1側 (tenants) -->
  <line x1="263" y1="250" x2="277" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="279" y="254" font-size="10" fill="#555">1</text>
  <!-- *側 (tasks): クロウフット -->
  <line x1="640" y1="308" x2="650" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="660" y1="308" x2="650" y2="320" stroke="#333" stroke-width="1.5"/>
  <text x="662" y="314" font-size="10" fill="#555">*</text>

  <!-- projects 1──* tasks (斜め: projects下→tasks上) -->
  <line x1="530" y1="245" x2="700" y2="320" stroke="#333" stroke-width="1.5"/>
  <!-- 1側 (projects) -->
  <line x1="524" y1="250" x2="538" y2="250" stroke="#333" stroke-width="1.5"/>
  <text x="540" y="254" font-size="10" fill="#555">1</text>
  <!-- *側 (tasks): クロウフット -->
  <line x1="690" y1="306" x2="700" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="710" y1="310" x2="700" y2="320" stroke="#333" stroke-width="1.5"/>
  <text x="712" y="314" font-size="10" fill="#555">*</text>

  <!-- users 0..1──* tasks (水平: y=440, x=320→580, 破線) -->
  <line x1="320" y1="440" x2="580" y2="440" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <!-- 0..1側 (users) -->
  <circle cx="330" cy="440" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
  <line x1="337" y1="433" x2="337" y2="447" stroke="#333" stroke-width="1.5"/>
  <text x="342" y="436" font-size="10" fill="#555">0..1</text>
  <!-- *側 (tasks): クロウフット -->
  <line x1="568" y1="430" x2="580" y2="440" stroke="#333" stroke-width="1.5"/>
  <line x1="568" y1="450" x2="580" y2="440" stroke="#333" stroke-width="1.5"/>
  <text x="570" y="426" font-size="10" fill="#555">*</text>

  <!-- 凡例 -->
  <rect x="680" y="70" width="210" height="120" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="695" y="92" font-size="12" font-weight="bold" fill="#333">凡例</text>
  <line x1="695" y1="108" x2="730" y2="108" stroke="#333" stroke-width="1.5"/>
  <text x="738" y="112" font-size="10" fill="#555">必須リレーション</text>
  <line x1="695" y1="130" x2="730" y2="130" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="738" y="134" font-size="10" fill="#555">任意リレーション (nullable FK)</text>
  <text x="695" y="158" font-size="10" fill="#333">🔑 主キー　🔗 外部キー</text>
  <!-- 凡例: クロウフット記号 -->
  <line x1="710" y1="168" x2="720" y2="175" stroke="#333" stroke-width="1.5"/>
  <line x1="710" y1="182" x2="720" y2="175" stroke="#333" stroke-width="1.5"/>
  <line x1="695" y1="175" x2="720" y2="175" stroke="#333" stroke-width="1.5"/>
  <text x="738" y="179" font-size="10" fill="#555">多 (*) 側</text>
</svg>
