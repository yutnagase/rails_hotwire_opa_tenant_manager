<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c8ebf"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="650" fill="#fff"/>

  <!-- タイトル -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">アーキテクチャ概要</text>

  <!-- ブラウザ -->
  <rect x="40" y="220" width="180" height="80" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="130" y="253" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">ブラウザ</text>
  <text x="130" y="275" text-anchor="middle" font-size="12" fill="#555">(Hotwire / Turbo)</text>

  <!-- Auth0 (外部サービス) -->
  <rect x="40" y="60" width="180" height="80" rx="12" fill="#fce5cd" stroke="#e69138" stroke-width="2"/>
  <text x="130" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Auth0</text>
  <text x="130" y="108" text-anchor="middle" font-size="11" fill="#555">(外部認証サービス)</text>
  <text x="130" y="125" text-anchor="middle" font-size="11" fill="#888">OAuth 2.0 / OIDC</text>

  <!-- 矢印: ブラウザ ↔ Auth0 -->
  <line x1="100" y1="220" x2="100" y2="142" stroke="#e69138" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="142" x2="160" y2="220" stroke="#e69138" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="42" y="185" font-size="10" fill="#e69138">ログイン</text>
  <text x="165" y="185" font-size="10" fill="#e69138">コールバック</text>

  <!-- Rails アプリコンテナ -->
  <rect x="320" y="80" width="340" height="400" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="490" y="108" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">Rails アプリケーション</text>
  <text x="490" y="126" text-anchor="middle" font-size="11" fill="#888">Web サーバー: Puma (Rails 標準)</text>

  <!-- Devise + OmniAuth -->
  <rect x="340" y="145" width="145" height="50" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="412" y="166" text-anchor="middle" font-size="12" fill="#333">Devise + OmniAuth</text>
  <text x="412" y="183" text-anchor="middle" font-size="11" fill="#666">(セッション管理)</text>

  <!-- acts_as_tenant -->
  <rect x="500" y="145" width="145" height="50" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="572" y="166" text-anchor="middle" font-size="12" fill="#333">acts_as_tenant</text>
  <text x="572" y="183" text-anchor="middle" font-size="11" fill="#666">(テナントスコーピング)</text>

  <!-- ApplicationController -->
  <rect x="355" y="225" width="275" height="60" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="492" y="247" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">ApplicationController</text>
  <text x="492" y="265" text-anchor="middle" font-size="11" fill="#555">scope_to_tenant / authorize_with_opa</text>

  <!-- OpaClient -->
  <rect x="355" y="315" width="125" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="417" y="336" text-anchor="middle" font-size="12" fill="#333">OpaClient</text>
  <text x="417" y="353" text-anchor="middle" font-size="11" fill="#555">(HTTP)</text>

  <!-- SET ROLE -->
  <rect x="505" y="315" width="125" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="567" y="336" text-anchor="middle" font-size="12" fill="#333">SET ROLE</text>
  <text x="567" y="353" text-anchor="middle" font-size="11" fill="#555">rails_user</text>

  <!-- ensure ブロック -->
  <rect x="355" y="395" width="275" height="40" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="492" y="420" text-anchor="middle" font-size="11" fill="#333">ensure: RESET ROLE / RESET app.current_tenant_id</text>

  <!-- OPA -->
  <rect x="310" y="510" width="190" height="80" rx="12" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="405" y="540" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">OPA</text>
  <text x="405" y="560" text-anchor="middle" font-size="12" fill="#555">(ポリシーエンジン)</text>
  <text x="405" y="578" text-anchor="middle" font-size="11" fill="#888">:8181</text>

  <!-- authz.rego -->
  <path d="M540,520 L660,520 L660,585 L540,585 L540,535 L555,520 Z" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="600" y="550" text-anchor="middle" font-size="11" fill="#333">authz.rego</text>
  <text x="600" y="567" text-anchor="middle" font-size="11" fill="#555">(Rego ポリシー)</text>

  <!-- PostgreSQL コンテナ -->
  <rect x="760" y="130" width="260" height="320" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="890" y="158" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">PostgreSQL 17</text>

  <!-- テーブル -->
  <rect x="785" y="180" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="830" y="207" text-anchor="middle" font-size="12" fill="#333">tenants</text>

  <rect x="900" y="180" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="945" y="207" text-anchor="middle" font-size="12" fill="#333">users</text>

  <rect x="785" y="245" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="830" y="272" text-anchor="middle" font-size="12" fill="#333">projects</text>

  <rect x="900" y="245" width="90" height="45" rx="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="945" y="272" text-anchor="middle" font-size="12" fill="#333">tasks</text>

  <!-- RLS ラベル -->
  <rect x="785" y="310" width="205" height="55" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1"/>
  <text x="887" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Row Level Security</text>
  <text x="887" y="348" text-anchor="middle" font-size="11" fill="#555">tenant_id による行フィルタリング</text>

  <!-- DB ロール -->
  <rect x="785" y="380" width="205" height="50" rx="4" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <text x="887" y="398" text-anchor="middle" font-size="11" fill="#333">postgres (スーパーユーザー) → マイグレーション</text>
  <text x="887" y="416" text-anchor="middle" font-size="11" fill="#333">rails_user (NOBYPASSRLS) → アプリ</text>

  <!-- 矢印 -->
  <!-- ブラウザ → Rails -->
  <line x1="220" y1="260" x2="318" y2="260" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="269" y="252" text-anchor="middle" font-size="10" fill="#555">HTTP</text>
  <text x="269" y="270" text-anchor="middle" font-size="10" fill="#555">(Turbo Drive)</text>

  <!-- Auth0 → Rails (コールバック) -->
  <line x1="220" y1="100" x2="338" y2="165" stroke="#e69138" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="280" y="100" text-anchor="middle" font-size="10" fill="#e69138">OAuth コールバック</text>

  <!-- SET ROLE → PostgreSQL -->
  <line x1="630" y1="340" x2="758" y2="280" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="700" y="325" text-anchor="middle" font-size="10" fill="#555">SQL</text>
  <text x="700" y="335" text-anchor="middle" font-size="10" fill="#555">(SET ROLE)</text>

  <!-- OpaClient → OPA -->
  <line x1="417" y1="365" x2="405" y2="508" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="446" text-anchor="middle" font-size="10" fill="#555">HTTP POST</text>
  <text x="445" y="456" text-anchor="middle" font-size="10" fill="#555">(JSON)</text>

  <!-- OPA → authz.rego -->
  <line x1="500" y1="550" x2="538" y2="550" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-dash)"/>

  <!-- セキュリティレイヤー凡例 -->
  <rect x="40" y="400" width="260" height="130" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1"/>
  <text x="170" y="420" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">セキュリティレイヤー</text>
  <text x="50" y="440" font-size="11" fill="#333">1. サブドメイン → テナント識別</text>
  <text x="50" y="458" font-size="11" fill="#333">2. Auth0 → 認証</text>
  <text x="50" y="476" font-size="11" fill="#333">3. acts_as_tenant → アプリ層分離</text>
  <text x="50" y="494" font-size="11" fill="#333">4. OPA → ロールベース認可</text>
  <text x="50" y="512" font-size="11" fill="#333">5. PostgreSQL RLS → DB層分離</text>
</svg>
