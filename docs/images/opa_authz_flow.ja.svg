<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 270" font-family="Helvetica, Arial, sans-serif">
  <!-- 背景 -->
  <rect width="880" height="270" fill="#fff"/>

  <!-- ===== リクエスト JSON (Rails の上方、OPA と重ならない位置) ===== -->
  <text x="170" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">リクエスト (JSON)</text>
  <rect x="70" y="24" width="200" height="82" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1"/>
  <text x="82" y="42" font-size="10" fill="#333">{</text>
  <text x="82" y="56" font-size="10" fill="#333">    role: "member",</text>
  <text x="82" y="70" font-size="10" fill="#333">    action: "update",</text>
  <text x="82" y="84" font-size="10" fill="#333">    resource: "task"</text>
  <text x="82" y="98" font-size="10" fill="#333">}</text>
  <!-- 吹き出し線: JSON枠 → 矢印中央 -->
  <line x1="270" y1="65" x2="310" y2="65" stroke="#d6b656" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="310" y1="65" x2="310" y2="140" stroke="#d6b656" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Rails アプリケーション ===== -->
  <rect x="20" y="120" width="180" height="80" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="110" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Rails</text>
  <text x="110" y="175" text-anchor="middle" font-size="11" fill="#555">ApplicationController</text>

  <!-- ===== 矢印1: アプリ → OPA ===== -->
  <line x1="200" y1="148" x2="430" y2="148" stroke="#333" stroke-width="1.5"/>
  <polygon points="430,143 442,148 430,153" fill="#333"/>
  <text x="316" y="168" text-anchor="middle" font-size="10" fill="#555">HTTP POST (JSON)</text>

  <!-- ===== OPA ===== -->
  <rect x="445" y="110" width="160" height="100" rx="10" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="525" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">OPA</text>
  <text x="525" y="165" text-anchor="middle" font-size="11" fill="#555">authz.rego 評価</text>
  <text x="525" y="182" text-anchor="middle" font-size="10" fill="#888">:8181</text>

  <!-- ===== 矢印2: OPA → 結果 ===== -->
  <line x1="605" y1="160" x2="670" y2="160" stroke="#333" stroke-width="1.5"/>
  <polygon points="670,155 682,160 670,165" fill="#333"/>

  <!-- ===== 結果 ===== -->
  <rect x="685" y="115" width="170" height="90" rx="10" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="770" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">レスポンス</text>
  <text x="770" y="164" text-anchor="middle" font-size="12" fill="#2e7d32">true → 許可 (200)</text>
  <text x="770" y="182" text-anchor="middle" font-size="12" fill="#c62828">false → 拒否 (403)</text>

  <!-- 下部ラベル -->
  <text x="440" y="250" text-anchor="middle" font-size="11" fill="#666">OPAがRegoポリシーを評価し、ロール×アクションの組み合わせで許可/拒否を判定する</text>
</svg>
