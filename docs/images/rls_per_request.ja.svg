<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 680" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6c8ebf"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="680" fill="#fff"/>

  <!-- タイトル -->
  <text x="430" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">リクエストごとの RLS 有効化フロー</text>

  <!-- アクター -->
  <!-- ブラウザ -->
  <rect x="40" y="70" width="140" height="50" rx="10" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">ブラウザ</text>

  <!-- Rails -->
  <rect x="280" y="70" width="200" height="50" rx="10" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="380" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">Rails (scope_to_tenant)</text>

  <!-- PostgreSQL -->
  <rect x="600" y="70" width="180" height="50" rx="10" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="690" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">PostgreSQL</text>

  <!-- ライフライン -->
  <line x1="110" y1="120" x2="110" y2="650" stroke="#6c8ebf" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="120" x2="380" y2="650" stroke="#9673a6" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="120" x2="690" y2="650" stroke="#b85450" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ステップ1: HTTP リクエスト -->
  <line x1="110" y1="155" x2="368" y2="155" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="140" y="138" width="200" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="240" y="151" text-anchor="middle" font-size="11" fill="#333">company-a.localhost/projects</text>
  <circle cx="50" cy="155" r="14" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="50" y="159" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">1</text>

  <!-- ステップ2: テナント解決 -->
  <rect x="310" y="175" width="140" height="40" rx="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="380" y="192" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">テナント解決</text>
  <text x="380" y="207" text-anchor="middle" font-size="10" fill="#555">サブドメイン → id: 1</text>
  <circle cx="50" cy="195" r="14" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="50" y="199" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">2</text>

  <!-- ステップ3: SET ROLE -->
  <line x1="380" y1="235" x2="678" y2="235" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="440" y="218" width="180" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="530" y="231" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">SET ROLE rails_user</text>
  <circle cx="50" cy="235" r="14" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="50" y="239" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">3</text>

  <!-- RLS 有効化インジケーター -->
  <rect x="720" y="228" width="120" height="20" rx="4" fill="#d5e8d4" stroke="#82b366" stroke-width="1"/>
  <text x="780" y="242" text-anchor="middle" font-size="10" font-weight="bold" fill="#82b366">RLS 有効化</text>

  <!-- ステップ4: テナントID設定 -->
  <line x1="380" y1="275" x2="678" y2="275" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="410" y="258" width="240" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="530" y="271" text-anchor="middle" font-size="11" fill="#333">SET app.current_tenant_id = '1'</text>
  <circle cx="50" cy="275" r="14" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="50" y="279" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">4</text>

  <!-- ステップ5: クエリ -->
  <line x1="380" y1="330" x2="678" y2="330" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="430" y="313" width="200" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="530" y="326" text-anchor="middle" font-size="11" fill="#333">SELECT * FROM projects</text>
  <circle cx="50" cy="330" r="14" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="50" y="334" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">5</text>

  <!-- RLS フィルターボックス -->
  <rect x="610" y="345" width="220" height="50" rx="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="720" y="365" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">RLS ポリシー適用</text>
  <text x="720" y="385" text-anchor="middle" font-size="10" fill="#555">→ WHERE tenant_id = 1</text>

  <!-- ステップ5 戻り -->
  <line x1="678" y1="410" x2="392" y2="410" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <rect x="450" y="398" width="180" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="540" y="411" text-anchor="middle" font-size="11" fill="#6c8ebf">テナント1の行のみ</text>

  <!-- ステップ6: レスポンス -->
  <line x1="380" y1="455" x2="122" y2="455" stroke="#6c8ebf" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <rect x="170" y="438" width="160" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="250" y="451" text-anchor="middle" font-size="11" fill="#6c8ebf">HTML / Turbo Frame</text>
  <circle cx="50" cy="455" r="14" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="50" y="459" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">6</text>

  <!-- ensure ブロック -->
  <rect x="300" y="490" width="160" height="25" rx="4" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="380" y="507" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">ensure ブロック</text>

  <!-- ステップ7: RESET ROLE -->
  <line x1="380" y1="535" x2="678" y2="535" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="470" y="518" width="120" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="530" y="531" text-anchor="middle" font-size="11" font-weight="bold" fill="#b85450">RESET ROLE</text>
  <circle cx="50" cy="535" r="14" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="50" y="539" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">7</text>

  <!-- ステップ8: RESET tenant_id -->
  <line x1="380" y1="575" x2="678" y2="575" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="410" y="558" width="220" height="18" rx="3" fill="#fff" fill-opacity="0.9" stroke="none"/>
  <text x="530" y="571" text-anchor="middle" font-size="11" fill="#333">RESET app.current_tenant_id</text>
  <circle cx="50" cy="575" r="14" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="50" y="579" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">8</text>

  <!-- RLS 無効化インジケーター -->
  <rect x="720" y="568" width="120" height="20" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="780" y="582" text-anchor="middle" font-size="10" fill="#999">スーパーユーザーに復元</text>

  <!-- 接続返却ラベル -->
  <rect x="310" y="610" width="340" height="25" rx="4" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="480" y="627" text-anchor="middle" font-size="11" fill="#555">接続をプールに返却（クリーンな状態）</text>
</svg>
